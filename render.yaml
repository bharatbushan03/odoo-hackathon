databases:
  - name: assetflow-db
    databaseName: assetflow
    user: assetflow
    plan: free

services:
  - type: web
    name: assetflow-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assetflow-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://assetflow-web.onrender.com

  - type: web
    name: assetflow-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://assetflow-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html